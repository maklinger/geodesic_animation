<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>

// ─── TUNING PARAMETERS ────────────────────────────────────────────────────────

const DT              = 0.01;   // Δλ per integration step (smaller = more accurate)
const STEPS_PER_FRAME = 5;      // integration steps per rendered frame
                                //   visual speed ∝ DT × STEPS_PER_FRAME
const TARGET_FPS      = 120;     // rendering rate (frames per second)
                                //   lower to save CPU, e.g. 30

// ─── PHYSICS PARAMETERS ───────────────────────────────────────────────────────

const M  = 1.0;
const a  = 0.9;   // spin: 0 = Schwarzschild, <1 = Kerr
const rs = 2 * M;
const a2 = a * a;
const r_horizon = M + Math.sqrt(M * M - a2);
const r_ergo    = rs;

// ─── VISUAL PARAMETERS ────────────────────────────────────────────────────────

const N_PHOTONS       = 18;
const TRAIL           = 700;
const RIPPLE_MAX_FRAC = 0.85;
const RIPPLE_DURATION = 90;   // frames

// ─────────────────────────────────────────────────────────────────────────────

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width  = canvas.offsetWidth  || window.innerWidth;
  canvas.height = canvas.offsetHeight || window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

function getScale() {
  return Math.min(canvas.width, canvas.height) / 20;
}

function frameDragOmega(r) {
  const r2    = r * r;
  const Delta = r2 - rs * r + a2;
  const denom = (r2 + a2) * (r2 + a2) - a2 * Delta;
  return (rs * r * a) / denom;
}

function kerr_rhs(r, phi, pr, L, E) {
  const r2    = r * r;
  const Delta = r2 - rs * r + a2;
  const phidot = (L / r2) - a * (a * L - (r2 + a2) * E) / (r2 * Delta);
  const P  = E * (r2 + a2) - a * L;
  const R  = P * P - Delta * (L - a * E) * (L - a * E);
  const dR = 2 * P * (2 * E * r) - (2 * r - rs) * (L - a * E) * (L - a * E);
  const prdot = dR / (2 * r2 * r2) - 2 * pr * pr / r;
  return [pr, phidot, prdot];
}

function rk4(r, phi, pr, L, E, dt) {
  const [k1r,k1p,k1pr] = kerr_rhs(r,           phi,           pr,           L, E);
  const [k2r,k2p,k2pr] = kerr_rhs(r+dt/2*k1r,  phi+dt/2*k1p, pr+dt/2*k1pr, L, E);
  const [k3r,k3p,k3pr] = kerr_rhs(r+dt/2*k2r,  phi+dt/2*k2p, pr+dt/2*k2pr, L, E);
  const [k4r,k4p,k4pr] = kerr_rhs(r+dt*k3r,    phi+dt*k3p,   pr+dt*k3pr,   L, E);
  return [
    r   + dt/6*(k1r  + 2*k2r  + 2*k3r  + k4r),
    phi + dt/6*(k1p  + 2*k2p  + 2*k3p  + k4p),
    pr  + dt/6*(k1pr + 2*k2pr + 2*k3pr + k4pr),
  ];
}

function redshift(r) {
  return Math.sqrt(Math.max(0.001, 1 - rs/r + a2/(r*r)));
}

function shiftColor(r, r0) {
  const t = Math.max(-1, Math.min(1, Math.log(redshift(r) / redshift(r0)) / Math.log(1.5)));
  if (t >= 0) {
    const rg = Math.round(255 * (1 - t));
    return [rg, rg, 255];
  } else {
    const gb = Math.round(255 * (1 + t));
    return [255, gb, gb];
  }
}

function spawnPhoton() {
  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const scale = getScale();

  const perim = 2 * (W + H);
  let t = Math.random() * perim;
  let sx, sy;
  if      (t < W)           { sx = t;         sy = 0; }
  else if (t < W + H)       { sx = W;          sy = t - W; }
  else if (t < 2 * W + H)   { sx = 2*W+H - t; sy = H; }
  else                      { sx = 0;          sy = perim - t; }

  const dx = (sx - cx) / scale;
  const dy = (sy - cy) / scale;
  const r0   = Math.sqrt(dx*dx + dy*dy);
  const phi0 = Math.atan2(dy, dx);

  const b_crit = 3 * Math.sqrt(3) * M * (1 - 0.15 * a);
  const b_sign = Math.random() > 0.5 ? 1 : -1;
  const b = b_sign * b_crit * (0.8 + Math.random() * 2.5);
  const E = 1.0, L = b * E;

  const r2    = r0 * r0;
  const Delta = r2 - rs * r0 + a2;
  const P     = E * (r2 + a2) - a * L;
  const R     = P * P - Delta * (L - a * E) * (L - a * E);
  const pr0sq = R / (r2 * r2);
  if (pr0sq < 0) return null;

  return { r: r0, phi: phi0, pr: -Math.sqrt(pr0sq), L, E, r0, trail: [] };
}

const N_SWIRL_RINGS = 4;
const N_SWIRL_DOTS  = 12;
let swirlDots = [];
for (let ri = 0; ri < N_SWIRL_RINGS; ri++) {
  const frac  = (ri + 1) / (N_SWIRL_RINGS + 1);
  const r     = r_horizon + frac * (r_ergo - r_horizon) * 1.8;
  const omega = frameDragOmega(r);
  for (let di = 0; di < N_SWIRL_DOTS; di++) {
    swirlDots.push({ r, phi: (2 * Math.PI * di) / N_SWIRL_DOTS, omega });
  }
}

let photons = [];
let ripples = [];
while (photons.length < N_PHOTONS) {
  const p = spawnPhoton(); if (p) photons.push(p);
}

function escapeR() {
  const W = canvas.width, H = canvas.height;
  return Math.sqrt((W/2)**2 + (H/2)**2) / getScale() + 2;
}

// ─── FRAME THROTTLE ───────────────────────────────────────────────────────────
const FRAME_INTERVAL = 1000 / TARGET_FPS; // ms between renders
let lastFrameTime = 0;

function frame(timestamp) {
  requestAnimationFrame(frame);

  // Throttle to TARGET_FPS
  if (timestamp - lastFrameTime < FRAME_INTERVAL) return;
  lastFrameTime = timestamp;

  const W = canvas.width, H = canvas.height;
  const cx = W / 2, cy = H / 2;
  const scale      = getScale();
  const rh_px      = r_horizon * scale;
  const re_px      = r_ergo    * scale;
  const RIPPLE_MAX_R = rh_px * RIPPLE_MAX_FRAC;
  const R_escape   = escapeR();

  ctx.fillStyle = "rgba(0,0,0,0.13)";
  ctx.fillRect(0, 0, W, H);

  // BH glow
  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rh_px * 4);
  g.addColorStop(0,    "rgba(0,0,0,1)");
  g.addColorStop(0.35, "rgba(25,8,45,0.85)");
  g.addColorStop(0.7,  "rgba(10,3,20,0.4)");
  g.addColorStop(1,    "rgba(0,0,0,0)");
  ctx.beginPath(); ctx.arc(cx, cy, rh_px * 4, 0, 2 * Math.PI);
  ctx.fillStyle = g; ctx.fill();

  // Ergosphere ring
  ctx.beginPath(); ctx.arc(cx, cy, re_px, 0, 2 * Math.PI);
  ctx.strokeStyle = "rgba(255,120,0,0.12)";
  ctx.lineWidth = 1; ctx.setLineDash([2, 5]); ctx.stroke(); ctx.setLineDash([]);

  // Frame-drag swirl dots
  for (let d of swirlDots) {
    d.phi += d.omega * DT * STEPS_PER_FRAME * 0.6;
    const sx = cx + d.r * Math.cos(d.phi) * scale;
    const sy = cy + d.r * Math.sin(d.phi) * scale;
    if (d.r > r_horizon * 1.05) {
      const distFrac = Math.max(0, 1 - (d.r - r_horizon) / (r_ergo * 2));
      ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, 2 * Math.PI);
      ctx.fillStyle = `rgba(255,140,0,${0.12 + distFrac * 0.25})`;
      ctx.fill();
    }
  }

  // Ripples — clipped inside horizon
  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, rh_px * 0.98, 0, 2 * Math.PI); ctx.clip();
  for (let i = ripples.length - 1; i >= 0; i--) {
    const rip = ripples[i];
    rip.age++;
    if (rip.age > RIPPLE_DURATION) { ripples.splice(i, 1); continue; }
    const progress = rip.age / RIPPLE_DURATION;
    for (let k = 0; k < 3; k++) {
      const kp = Math.max(0, progress - k * 0.18);
      if (kp <= 0) continue;
      const ka = (1 - kp) * (0.5 - k * 0.12);
      if (ka <= 0) continue;
      ctx.beginPath();
      ctx.arc(rip.x, rip.y, kp * RIPPLE_MAX_R, 0, 2 * Math.PI);
      ctx.strokeStyle = `rgba(${rip.cr},${rip.cg},${rip.cb},${ka})`;
      ctx.lineWidth = 1.3 - k * 0.3;
      ctx.stroke();
    }
  }
  ctx.restore();

  // Event horizon
  ctx.beginPath(); ctx.arc(cx, cy, rh_px, 0, 2 * Math.PI);
  ctx.strokeStyle = "rgba(255,160,40,0.8)"; ctx.lineWidth = 1.5; ctx.stroke();

  // Photon sphere
  const r_ph = (3 - a * 0.5) * M;
  ctx.beginPath(); ctx.arc(cx, cy, r_ph * scale, 0, 2 * Math.PI);
  ctx.strokeStyle = "rgba(200,200,80,0.18)";
  ctx.lineWidth = 1; ctx.setLineDash([3, 6]); ctx.stroke(); ctx.setLineDash([]);

  // Refill & step photons
  while (photons.length < N_PHOTONS) {
    const p = spawnPhoton(); if (p) photons.push(p);
  }

  for (let i = photons.length - 1; i >= 0; i--) {
    const p = photons[i];

    // ── Multiple integration steps per frame ──
    let nr = p.r, nphi = p.phi, npr = p.pr;
    let dead = false;
    for (let s = 0; s < STEPS_PER_FRAME; s++) {
      [nr, nphi, npr] = rk4(nr, nphi, npr, p.L, p.E, DT);
      if (isNaN(nr) || nr < r_horizon * 1.02) { dead = true; break; }
    }

    const swallowed = dead;
    const escaped   = !dead && nr > R_escape;

    if (swallowed || escaped) {
      if (swallowed && p.trail.length > 0) {
        const [lx, ly, lr, lg, lb] = p.trail[p.trail.length - 1];
        const angle = Math.atan2(ly - cy, lx - cx);
        ripples.push({
          x: cx + Math.cos(angle) * rh_px * 0.75,
          y: cy + Math.sin(angle) * rh_px * 0.75,
          age: 0, cr: lr, cg: lg, cb: lb
        });
      }
      photons.splice(i, 1);
      continue;
    }

    p.r = nr; p.phi = nphi; p.pr = npr;
    const x = cx + p.r * Math.cos(p.phi) * scale;
    const y = cy + p.r * Math.sin(p.phi) * scale;
    const [rc, gc, bc] = shiftColor(p.r, p.r0);
    p.trail.push([x, y, rc, gc, bc]);
    if (p.trail.length > TRAIL) p.trail.shift();

    for (let j = 1; j < p.trail.length; j++) {
      const alpha = (j / p.trail.length) * 0.85;
      const [xp, yp] = p.trail[j - 1];
      const [xc, yc, rc2, gc2, bc2] = p.trail[j];
      ctx.beginPath(); ctx.moveTo(xp, yp); ctx.lineTo(xc, yc);
      ctx.strokeStyle = `rgba(${rc2},${gc2},${bc2},${alpha})`;
      ctx.lineWidth = 1.2; ctx.stroke();
    }

    ctx.beginPath(); ctx.arc(x, y, 2, 0, 2 * Math.PI);
    ctx.fillStyle = `rgb(${rc},${gc},${bc})`; ctx.fill();
  }

  // HUD
  // ctx.font = "12px monospace";
  // ctx.fillStyle = "rgba(150,150,150,0.45)";
  // ctx.fillText(`Kerr  a/M = ${a}   r_H = ${r_horizon.toFixed(3)} M`, 14, 22);
  // ctx.fillStyle = "rgba(255,140,0,0.4)";
  // ctx.fillText(`ergosphere r = ${r_ergo.toFixed(0)} M  (frame dragging)`, 14, 40);
  // ctx.fillStyle = "rgba(180,180,180,0.3)";
  // ctx.fillText(`Δλ = ${DT}  ×${STEPS_PER_FRAME} steps/frame  @ ${TARGET_FPS} fps`, 14, 58);
  // ctx.fillStyle = "rgba(100,100,255,0.6)";
  // ctx.fillText("● blueshift", 14, 76);
  // ctx.fillStyle = "rgba(255,100,100,0.6)";
  // ctx.fillText("● redshift", 14, 58);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
