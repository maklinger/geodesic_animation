<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }

  #controls {
    position: fixed;
    top: 12px;
    right: 16px;
    color: rgba(200,200,200,0.75);
    font: 12px monospace;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 10;
    background: rgba(0,0,0,0.35);
    padding: 10px 14px;
    border-radius: 8px;
    min-width: 220px;
  }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .label { flex: 0 0 110px; }
  input[type=range] { flex: 1; accent-color: rgba(180,180,255,0.8); cursor: pointer; }
  .val { flex: 0 0 36px; text-align: right; color: rgba(255,255,180,0.9); }
  .divider { border-top: 1px solid rgba(255,255,255,0.1); margin: 2px 0; }
  .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .switch { position: relative; display: inline-block; width: 36px; height: 18px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider-sw {
    position: absolute; cursor: pointer; inset: 0;
    background: rgba(80,80,80,0.8); border-radius: 18px; transition: .25s;
  }
  .slider-sw:before {
    content: ""; position: absolute;
    width: 12px; height: 12px; left: 3px; bottom: 3px;
    background: #ccc; border-radius: 50%; transition: .25s;
  }
  input:checked + .slider-sw { background: rgba(120,120,255,0.7); }
  input:checked + .slider-sw:before { transform: translateX(18px); background: #fff; }

  #hud {
    position: fixed;
    top: 12px;
    left: 14px;
    z-index: 10;
    pointer-events: none;
  }
  #hud-title {
    font: bold 15px monospace;
    color: rgba(220,220,255,0.85);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  #hud-info {
    font: 12px monospace;
    color: rgba(150,150,150,0.45);
    line-height: 1.7;
  }
  #hud-info span.blue { color: rgba(100,100,255,0.7); }
  #hud-info span.red  { color: rgba(255,100,100,0.7); }
  #hud-info span.orange { color: rgba(255,140,0,0.5); }
  #hud-info span.dim  { color: rgba(180,180,180,0.35); }
  #hud-link {
    pointer-events: all;
    margin-top: 8px;
    font: 12px monospace;
  }
  #hud-link a {
    color: rgba(140,180,255,0.65);
    text-decoration: none;
  }
  #hud-link a:hover {
    color: rgba(180,210,255,0.9);
    text-decoration: underline;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<!-- HUD: title + legend + link -->
<div id="hud">
  <div id="hud-title">Photon geodesics around<br>spinning black hole</div>
  <div id="hud-info">
    <span id="hud-kerr"></span><br>
    <span id="hud-ergo" class="orange"></span><br>
    <span id="hud-int" class="dim"></span><br>
    <span class="blue">● blueshift</span>&nbsp;&nbsp;<span class="red">● redshift</span><br>
    <span id="hud-beam" class="dim"></span>
  </div>
  <div id="hud-link">
    <a href="https://github.com/maklinger/geodesic_animation#readme" target="_blank">more information</a>
  </div>
</div>

<!-- Controls -->
<div id="controls">
  <div class="row">
    <span class="label">photons (N)</span>
    <input type="range" id="sl_n" min="1" max="100" step="1" value="18">
    <span class="val" id="vl_n">18</span>
  </div>
  <div class="row">
    <span class="label">trail length</span>
    <input type="range" id="sl_trail" min="20" max="1200" step="20" value="700">
    <span class="val" id="vl_trail">700</span>
  </div>
  <div class="row">
    <span class="label">spin  a/M</span>
    <input type="range" id="sl_a" min="0.01" max="0.999" step="0.01" value="0.9">
    <span class="val" id="vl_a">0.90</span>
  </div>
  <div class="row">
    <span class="label">Δλ (accuracy)</span>
    <input type="range" id="sl_dt" min="0.002" max="0.1" step="0.002" value="0.02">
    <span class="val" id="vl_dt">0.020</span>
  </div>
  <div class="row">
    <span class="label">steps/frame</span>
    <input type="range" id="sl_spf" min="1" max="30" step="1" value="3">
    <span class="val" id="vl_spf">3</span>
  </div>
  <div class="row">
    <span class="label">target fps</span>
    <input type="range" id="sl_fps" min="10" max="120" step="3" value="60">
    <span class="val" id="vl_fps">60</span>
  </div>
  <div class="divider"></div>
  <div class="toggle-row">
    <span class="label">parallel beam</span>
    <label class="switch">
      <input type="checkbox" id="tog_beam">
      <span class="slider-sw"></span>
    </label>
  </div>
  <div class="row">
    <span class="label">beam angle °</span>
    <input type="range" id="sl_angle" min="0" max="360" step="1" value="0">
    <span class="val" id="vl_angle">180</span>
  </div>
</div>

<script>
const canvas = document.getElementById("c");
const ctx    = canvas.getContext("2d");

function resize() {
  canvas.width  = canvas.offsetWidth  || window.innerWidth;
  canvas.height = canvas.offsetHeight || window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let N_PHOTONS       = 18;
let TRAIL           = 700;
let a               = 0.9;
let DT              = 0.02;
let STEPS_PER_FRAME = 3;
let TARGET_FPS      = 60;
let BEAM_MODE       = false;
let BEAM_ANGLE_DEG  = 180;

let photons = [];
let ripples = [];

const M  = 1.0;
const rs = 2 * M;
let a2, r_horizon, r_ergo, swirlDots;

function frameDragOmega(r) {
  const r2    = r * r;
  const Delta = r2 - rs * r + a2;
  const denom = (r2 + a2) * (r2 + a2) - a2 * Delta;
  return (rs * r * a) / denom;
}

function buildSwirlDots() {
  swirlDots = [];
  for (let ri = 0; ri < 4; ri++) {
    const frac  = (ri + 1) / 5;
    const r     = r_horizon + frac * (r_ergo - r_horizon) * 1.8;
    const omega = frameDragOmega(r);
    for (let di = 0; di < 12; di++) {
      swirlDots.push({ r, phi: (2 * Math.PI * di) / 12, omega });
    }
  }
}

function resetPhysics() {
  a2        = a * a;
  r_horizon = M + Math.sqrt(M * M - a2);
  r_ergo    = rs;
  buildSwirlDots();
  photons   = [];
  updateHUD();
}
resetPhysics();

function updateHUD() {
  document.getElementById("hud-kerr").textContent =
    `Kerr  a/M = ${a.toFixed(2)}   r+ = ${r_horizon.toFixed(3)} M`;
  document.getElementById("hud-ergo").textContent =
    `ergosphere r = ${r_ergo.toFixed(2)} M  (frame dragging)`;
  document.getElementById("hud-int").textContent =
    `Δλ=${DT.toFixed(3)}  ×${STEPS_PER_FRAME}/frame  @${TARGET_FPS}fps`;
  const beamEl = document.getElementById("hud-beam");
  beamEl.textContent = BEAM_MODE ? `beam  ${BEAM_ANGLE_DEG}°` : "";
}

function bindSlider(id, valId, setter, fmt) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener("input", () => {
    const v = parseFloat(sl.value);
    setter(v);
    vl.textContent = fmt(v);
    updateHUD();
  });
}
bindSlider("sl_n",     "vl_n",     v => { N_PHOTONS = Math.round(v); },       v => Math.round(v));
bindSlider("sl_trail", "vl_trail", v => { TRAIL = Math.round(v); },            v => Math.round(v));
bindSlider("sl_a",     "vl_a",     v => { a = v; resetPhysics(); },            v => v.toFixed(2));
bindSlider("sl_dt",    "vl_dt",    v => { DT = v; },                          v => v.toFixed(3));
bindSlider("sl_spf",   "vl_spf",   v => { STEPS_PER_FRAME = Math.round(v); }, v => Math.round(v));
bindSlider("sl_fps",   "vl_fps",   v => { TARGET_FPS = Math.round(v); },      v => Math.round(v));
bindSlider("sl_angle", "vl_angle", v => { BEAM_ANGLE_DEG = v; photons = []; updateHUD(); }, v => Math.round(v));
document.getElementById("tog_beam").addEventListener("change", e => {
  BEAM_MODE = e.target.checked;
  photons = [];
  updateHUD();
});

function kerr_rhs(r, phi, pr, L, E) {
  const r2     = r * r;
  const Delta  = r2 - rs * r + a2;
  const phidot = (L / r2) - a * (a * L - (r2 + a2) * E) / (r2 * Delta);
  const P      = E * (r2 + a2) - a * L;
  const R      = P * P - Delta * (L - a * E) * (L - a * E);
  const dR     = 2 * P * (2 * E * r) - (2 * r - rs) * (L - a * E) * (L - a * E);
  const prdot  = dR / (2 * r2 * r2) - 2 * pr * pr / r;
  return [pr, phidot, prdot];
}

function rk4(r, phi, pr, L, E, dt) {
  const [k1r,k1p,k1pr] = kerr_rhs(r,           phi,           pr,           L, E);
  const [k2r,k2p,k2pr] = kerr_rhs(r+dt/2*k1r,  phi+dt/2*k1p, pr+dt/2*k1pr, L, E);
  const [k3r,k3p,k3pr] = kerr_rhs(r+dt/2*k2r,  phi+dt/2*k2p, pr+dt/2*k2pr, L, E);
  const [k4r,k4p,k4pr] = kerr_rhs(r+dt*k3r,    phi+dt*k3p,   pr+dt*k3pr,   L, E);
  return [
    r   + dt/6*(k1r  + 2*k2r  + 2*k3r  + k4r),
    phi + dt/6*(k1p  + 2*k2p  + 2*k3p  + k4p),
    pr  + dt/6*(k1pr + 2*k2pr + 2*k3pr + k4pr),
  ];
}

function redshift(r) {
  return Math.sqrt(Math.max(0.001, 1 - rs/r + a2/(r*r)));
}
function shiftColor(r, r0) {
  const t = Math.max(-1, Math.min(1, Math.log(redshift(r) / redshift(r0)) / Math.log(1.5)));
  if (t >= 0) { const rg = Math.round(255*(1-t)); return [rg, rg, 255]; }
  else        { const gb = Math.round(255*(1+t)); return [255, gb, gb]; }
}
function getScale() { return Math.min(canvas.width, canvas.height) / 20; }
function escapeR() {
  const W = canvas.width, H = canvas.height;
  return Math.sqrt((W/2)**2 + (H/2)**2) / getScale() + 2;
}

function spawnPhotonRandom() {
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, scale = getScale();
  const perim = 2*(W+H);
  let t = Math.random()*perim, sx, sy;
  if      (t < W)     { sx = t;        sy = 0; }
  else if (t < W+H)   { sx = W;        sy = t-W; }
  else if (t < 2*W+H) { sx = 2*W+H-t; sy = H; }
  else                { sx = 0;        sy = perim-t; }
  const dx = (sx-cx)/scale, dy = (sy-cy)/scale;
  const r0 = Math.sqrt(dx*dx+dy*dy), phi0 = Math.atan2(dy,dx);
  const b_crit = 3*Math.sqrt(3)*M*(1-0.15*a);
  const b = (Math.random()>0.5?1:-1)*b_crit*(0.8+Math.random()*2.5);
  const E = 1.0, L = b*E;
  const r2 = r0*r0, Delta = r2-rs*r0+a2;
  const P = E*(r2+a2)-a*L, R = P*P-Delta*(L-a*E)*(L-a*E);
  const pr0sq = R/(r2*r2);
  if (pr0sq < 0) return null;
  return { r: r0, phi: phi0, pr: -Math.sqrt(pr0sq), L, E, r0, trail: [] };
}

function spawnPhotonBeam(index) {
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, scale = getScale();
  const angleRad = BEAM_ANGLE_DEG * Math.PI / 180;
  const bx = Math.cos(angleRad), by = Math.sin(angleRad);
  const px = -by, py = bx;
  const spread = Math.min(W, H) * 0.92;
  const frac   = N_PHOTONS > 1 ? index / (N_PHOTONS - 1) : 0.5;
  const offset = (frac - 0.5) * spread;
  const reach  = Math.sqrt((W/2)**2 + (H/2)**2) * 1.01;
  const sx = cx - bx * reach + px * offset;
  const sy = cy - by * reach + py * offset;
  const dx = (sx - cx) / scale, dy = (sy - cy) / scale;
  const r0   = Math.sqrt(dx*dx + dy*dy);
  const phi0 = Math.atan2(dy, dx);
  const b = dx * by - dy * bx;
  const E = 1.0, L = b * E;
  const r2    = r0 * r0;
  const Delta = r2 - rs * r0 + a2;
  const P     = E * (r2 + a2) - a * L;
  const R     = P * P - Delta * (L - a * E) * (L - a * E);
  const pr0sq = R / (r2 * r2);
  if (pr0sq < 0) return null;
  const inward = (bx * dx + by * dy) < 0;
  const pr0 = inward ? -Math.sqrt(pr0sq) : Math.sqrt(pr0sq);
  return { r: r0, phi: phi0, pr: pr0, L, E, r0, trail: [] };
}

function spawnPhoton(index) {
  return BEAM_MODE ? spawnPhotonBeam(index) : spawnPhotonRandom();
}

const RIPPLE_MAX_FRAC = 0.85;
const RIPPLE_DURATION = 90;
let lastFrameTime = 0;

function frame(timestamp) {
  requestAnimationFrame(frame);
  if (timestamp - lastFrameTime < 1000 / TARGET_FPS) return;
  lastFrameTime = timestamp;

  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, scale = getScale();
  const rh_px = r_horizon * scale;
  const re_px = r_ergo    * scale;
  const RIPPLE_MAX_R = rh_px * RIPPLE_MAX_FRAC;
  const R_escape = escapeR();

  ctx.fillStyle = "rgba(0,0,0,0.13)";
  ctx.fillRect(0, 0, W, H);

  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rh_px*4);
  g.addColorStop(0,    "rgba(0,0,0,1)");
  g.addColorStop(0.35, "rgba(25,8,45,0.85)");
  g.addColorStop(0.7,  "rgba(10,3,20,0.4)");
  g.addColorStop(1,    "rgba(0,0,0,0)");
  ctx.beginPath(); ctx.arc(cx, cy, rh_px*4, 0, 2*Math.PI);
  ctx.fillStyle = g; ctx.fill();

  ctx.beginPath(); ctx.arc(cx, cy, re_px, 0, 2*Math.PI);
  ctx.strokeStyle = "rgba(255,120,0,0.12)";
  ctx.lineWidth = 1; ctx.setLineDash([2,5]); ctx.stroke(); ctx.setLineDash([]);

  for (const d of swirlDots) {
    d.phi += d.omega * DT * STEPS_PER_FRAME * 0.6;
    const sx = cx + d.r*Math.cos(d.phi)*scale;
    const sy = cy + d.r*Math.sin(d.phi)*scale;
    if (d.r > r_horizon*1.05) {
      const df = Math.max(0, 1-(d.r-r_horizon)/(r_ergo*2));
      ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, 2*Math.PI);
      ctx.fillStyle = `rgba(255,140,0,${0.12+df*0.25})`; ctx.fill();
    }
  }

  ctx.save();
  ctx.beginPath(); ctx.arc(cx, cy, rh_px*0.98, 0, 2*Math.PI); ctx.clip();
  for (let i = ripples.length-1; i >= 0; i--) {
    const rip = ripples[i]; rip.age++;
    if (rip.age > RIPPLE_DURATION) { ripples.splice(i,1); continue; }
    const progress = rip.age / RIPPLE_DURATION;
    for (let k = 0; k < 3; k++) {
      const kp = Math.max(0, progress-k*0.18); if (kp <= 0) continue;
      const ka = (1-kp)*(0.5-k*0.12);          if (ka <= 0) continue;
      ctx.beginPath(); ctx.arc(rip.x, rip.y, kp*RIPPLE_MAX_R, 0, 2*Math.PI);
      ctx.strokeStyle = `rgba(${rip.cr},${rip.cg},${rip.cb},${ka})`;
      ctx.lineWidth = 1.3-k*0.3; ctx.stroke();
    }
  }
  ctx.restore();

  ctx.beginPath(); ctx.arc(cx, cy, rh_px, 0, 2*Math.PI);
  ctx.strokeStyle = "rgba(255,160,40,0.8)"; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.beginPath(); ctx.arc(cx, cy, (3-a*0.5)*M*scale, 0, 2*Math.PI);
  ctx.strokeStyle = "rgba(200,200,80,0.18)";
  ctx.lineWidth = 1; ctx.setLineDash([3,6]); ctx.stroke(); ctx.setLineDash([]);

  if (BEAM_MODE && photons.length !== N_PHOTONS) {
    photons = [];
    for (let i = 0; i < N_PHOTONS; i++) {
      const p = spawnPhotonBeam(i); if (p) photons.push(p);
    }
  }
  while (!BEAM_MODE && photons.length > N_PHOTONS) photons.pop();
  while (!BEAM_MODE && photons.length < N_PHOTONS) {
    const p = spawnPhoton(); if (p) photons.push(p);
  }
  for (const p of photons) {
    if (p.trail.length > TRAIL) p.trail.splice(0, p.trail.length - TRAIL);
  }

  for (let i = photons.length-1; i >= 0; i--) {
    const p = photons[i];
    let nr = p.r, nphi = p.phi, npr = p.pr, dead = false;
    for (let s = 0; s < STEPS_PER_FRAME; s++) {
      [nr, nphi, npr] = rk4(nr, nphi, npr, p.L, p.E, DT);
      if (isNaN(nr) || nr < r_horizon*1.02) { dead = true; break; }
    }
    const escaped = !dead && nr > R_escape;
    if (dead || escaped) {
      if (dead && p.trail.length > 0) {
        const [lx,ly,lr,lg,lb] = p.trail[p.trail.length-1];
        const angle = Math.atan2(ly-cy, lx-cx);
        ripples.push({ x: cx+Math.cos(angle)*rh_px*0.75,
                       y: cy+Math.sin(angle)*rh_px*0.75,
                       age: 0, cr: lr, cg: lg, cb: lb });
      }
      if (BEAM_MODE) {
        const fresh = spawnPhotonBeam(i);
        if (fresh) { photons[i] = fresh; continue; }
      }
      photons.splice(i, 1); continue;
    }
    p.r = nr; p.phi = nphi; p.pr = npr;
    const x = cx+p.r*Math.cos(p.phi)*scale;
    const y = cy+p.r*Math.sin(p.phi)*scale;
    const [rc,gc,bc] = shiftColor(p.r, p.r0);
    p.trail.push([x,y,rc,gc,bc]);
    if (p.trail.length > TRAIL) p.trail.shift();

    for (let j = 1; j < p.trail.length; j++) {
      const alpha = (j/p.trail.length)*0.85;
      const [xp,yp] = p.trail[j-1], [xc,yc,rc2,gc2,bc2] = p.trail[j];
      ctx.beginPath(); ctx.moveTo(xp,yp); ctx.lineTo(xc,yc);
      ctx.strokeStyle = `rgba(${rc2},${gc2},${bc2},${alpha})`;
      ctx.lineWidth = 1.2; ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(x, y, 2, 0, 2*Math.PI);
    ctx.fillStyle = `rgb(${rc},${gc},${bc})`; ctx.fill();
  }
}

requestAnimationFrame(frame);
</script>
</body>
</html>
